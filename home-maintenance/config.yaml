name: Home Maintenance Tracker
version: "2.0.0"
slug: home_maintenance
description: Track recurring maintenance and house repair todos from inside Home Assistant.
url: https://github.com/mondonea/MxTracker
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:home-clock
panel_title: Maintenance
panel_admin: false
homeassistant_api: true
ports: {}
ports_description: {}
options:
  upcoming_window_days: 30
  request_logging: false
  publish_homeassistant_sensors: true
  homeassistant_publish_interval_seconds: 300
  seed_demo_data: false
  api_action_token: ""
schema:
  upcoming_window_days: int
  request_logging: bool
  publish_homeassistant_sensors: bool
  homeassistant_publish_interval_seconds: int
  seed_demo_data: bool
  api_action_token: password
backup: hot
